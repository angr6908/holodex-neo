server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /seo.html {
        try_files $uri =404;
    }

    # Cache static assets aggressively
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|avif|webp|json|txt|xml|webmanifest|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
