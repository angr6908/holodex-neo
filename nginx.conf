server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /seo.html {
    try_files $uri =404;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|json|txt|xml|webmanifest|map)$ {
    try_files $uri =404;
  }
}
