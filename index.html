    <style>
        .scroll-bar, * {
            scrollbar-width: thin;
            scrollbar-color: rgb(148 163 184 / 0.55) transparent;
        }

        .scroll-bar::-webkit-scrollbar, ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .scroll-bar::-webkit-scrollbar-track, ::-webkit-scrollbar-track {
            background: transparent;
        }

        .scroll-bar::-webkit-scrollbar-thumb, ::-webkit-scrollbar-thumb {
            background: rgb(148 163 184 / 0.55);
            border-radius: 999px;
        }
        
    </style>
    <script>
      // Blocking theme init — must run before first paint to prevent FOUC
      (function() {
        try {
          var h = document.documentElement;
          h.classList.add('theme-switching');

          var s = localStorage.getItem('holodex-v2-settings');
          var settings = s ? JSON.parse(s) : {};
          var isDark = true;
          if (settings.followSystemTheme) {
            isDark = window.matchMedia
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
              : true;
          } else if (typeof settings.darkMode === 'boolean') {
            isDark = settings.darkMode;
          }
          var mode = isDark ? 'dark' : 'light';
          h.setAttribute('data-theme', mode);
          h.style.colorScheme = mode;

          var cachedBg = localStorage.getItem('holodex-theme-bg');
          if (cachedBg) {
            h.style.setProperty('--colorbg', cachedBg);
            h.style.backgroundColor = cachedBg;
          } else if (!isDark) {
            h.style.setProperty('--colorbg', '#eef2f7');
            h.style.backgroundColor = '#eef2f7';
          }
        } catch(e) {}

        // Suppress transitions when returning to the tab to prevent
        // content-visibility: auto elements from flashing during re-paint.
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            var root = document.documentElement;
            root.classList.add('theme-switching');
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                  root.classList.remove('theme-switching');
                });
              });
            });
          }
        });
      })();
    </script>
